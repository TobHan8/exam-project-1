<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content=width=device-width, initial-scale=1.0>
    <meta title="Checkout | Online Shop (Must be logged in)">
    <meta description="Please fill out checkout details for your order. You must be logged in to view this page.">
    <title>Checkout | Online Shop</title>
    <link rel="stylesheet" href="src/css/styles.css">
    <script src="https://kit.fontawesome.com/71249f71bc.js" crossorigin="anonymous"></script>
    <script defer type="module" src="src/js/pages/checkout.js"></script>
</head>

  <body>

      <header aria-label="Website header">

        <div class="header-buttons">

          <label for="menu-checkbox" class="hamburger-icon">
            <i class="fas fa-bars"></i>
          </label>  

          <a href="index.html" class="header-logo" aria-label="Return to home page">
            <img src="assets/images/desktop/desktop-logo.png" alt="Online Shop clickable logo">
          </a>

          <a href="index.html" class="header-logo-mobile" aria-label="Return to home page">
            <img src="assets/images/mobile/mobile-logo.png" alt="Online Shop clickable logo">
          </a>

          <a href="cart.html" class="cart-button" aria-label="Shopping cart">
            <i class="fas fa-shopping-cart"></i>
          </a>

        </div>

        <input type="checkbox" id="menu-checkbox">
        <nav>
          <a href="index.html">
            <i class="fa-solid fa-house"></i>
            <span>HOME</span>
        </a>
          <a href="checkout.html">
            <i class="fa-solid fa-cart-shopping"></i>
            <span>CART</span>
          </a>
          <a href="login.html">
            <i class="fa-solid fa-right-to-bracket"></i>
            <span>LOG IN</span>
          </a>
          <a href="register.html">
            <i class="fa-solid fa-user-plus"></i>
            <span>REGISTER</span>
          </a>
          <button id="log-out">
            <i class="fa-solid fa-circle-xmark"></i>
            <span>LOG OUT</span>
          </button>
        </nav>

      </header>

      <div class="hero-container">
        <div class="hero-background-image"></div>
      </div>

      <div id="toast-container"></div>

      <div class="checkout-container" id="checkout-container">
        <div id="title-container" class="title-container">
            <h1>FILL OUT DETAILS</h1>
        </div>
        <p class="loading-indicator" id="loading-indicator">Loading...</p>
      </div>

      <footer id="footer" aria-label="Website footer">

        <div class="footer-buttons">

          <a href="index.html" class="footer-logo" aria-label="Return to home page">
            <img src="assets/images/desktop/desktop-logo.png" alt="Online Shop clickable logo">
          </a>
          
          <div class="footer-socials">
            <a href="https://www.facebook.com" target="_blank" aria-label="Visit us on Facebook!">
              <i class="fa-brands fa-square-facebook"></i>
            </a>
            <a href="https://www.instagram.com" target="_blank" aria-label="Visit us on Instagram!">
              <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="https://www.twitter.com" target="_blank" aria-label="Visit us on Twitter/X!">
              <i class="fa-brands fa-x-twitter"></i>
            </a>
            <a href="https://www.youtube.com" target="_blank" aria-label="Visit us on YouTube!">
              <i class="fa-brands fa-youtube"></i>
            </a>
          </div>

        </div>

      </footer>
      
  </body>
</html>
